name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # track the toolchain declared in go.mod so CI and go.mod never drift.
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Lint (golangci-lint v2)
        uses: golangci/golangci-lint-action@v9
        with:
          # pinned to the version used locally (pre-commit) so CI == local.
          version: v2.11.2
          # build from source with the runner's go.mod toolchain: prebuilt
          # binaries are compiled with an older Go than go.mod targets, which
          # golangci-lint rejects ("Go version used to build golangci-lint is
          # lower than the targeted Go version").
          install-mode: goinstall

      - name: Coverage gate (race + per-package 80%)
        # run the exact same gate the Makefile uses, so CI == local.
        # writes coverage.out at the repo root, consumed by Codecov below.
        run: make cover

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
